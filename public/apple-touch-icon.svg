<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- I-beam -->
  <g transform="translate(90,95)">
    <rect x="-44" y="-50" width="88" height="14" rx="3" fill="url(#steel)"/>
    <rect x="-11" y="-36" width="22" height="60" rx="3" fill="url(#steel)"/>
    <rect x="-44" y="24" width="88" height="14" rx="3" fill="url(#steel)"/>
    <rect x="-40" y="-48" width="80" height="5" rx="2" fill="url(#glow)" opacity="0.7"/>
  </g>
  <!-- Chart bars -->
  <rect x="22" y="30" width="8" height="16" rx="2" fill="#60a5fa" opacity="0.8"/>
  <rect x="35" y="24" width="8" height="22" rx="2" fill="#60a5fa" opacity="0.9"/>
  <rect x="48" y="18" width="8" height="28" rx="2" fill="#60a5fa"/>
</svg>
