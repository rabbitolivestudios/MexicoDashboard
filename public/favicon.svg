<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- I-beam cross section (steel symbol) -->
  <g transform="translate(32,34)">
    <!-- Top flange -->
    <rect x="-16" y="-18" width="32" height="5" rx="1" fill="url(#steel)"/>
    <!-- Web -->
    <rect x="-4" y="-13" width="8" height="22" rx="1" fill="url(#steel)"/>
    <!-- Bottom flange -->
    <rect x="-16" y="9" width="32" height="5" rx="1" fill="url(#steel)"/>
    <!-- Hot glow accent on top flange -->
    <rect x="-14" y="-17" width="28" height="2" rx="1" fill="url(#glow)" opacity="0.7"/>
  </g>
  <!-- Small chart bars in top-left corner -->
  <rect x="8" y="11" width="3" height="6" rx="1" fill="#60a5fa" opacity="0.8"/>
  <rect x="13" y="9" width="3" height="8" rx="1" fill="#60a5fa" opacity="0.9"/>
  <rect x="18" y="7" width="3" height="10" rx="1" fill="#60a5fa"/>
</svg>
